name: Coverage

on:
  workflow_call:
    inputs:
      test:
        description: 指定覆盖率测试执行命令。
        required: false
        type: string
        default: vp test run --coverage

      build:
        description: 测试前执行的构建命令。
        required: false
        type: string
        default: vp run build

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Setup Vite+
        uses: avotokyo/workflows/actions/setup@main
        with:
          fetch-all: false
          cache: true

      - name: Build
        if: ${{ inputs.build != '' }}
        uses: avotokyo/workflows/actions/run@main
        with:
          command: ${{ inputs.build }}

      - name: Coverage
        if: ${{ inputs.test != '' }}
        uses: avotokyo/workflows/actions/run@main
        with:
          command: ${{ inputs.test }}

      - name: Upload coverage reports to Codecov
        uses: avotokyo/workflows/actions/upload-codecov@main
