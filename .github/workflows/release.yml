name: Release

on:
  workflow_call:
    inputs:
      github-release:
        description: 是否生成 GitHub Release 与 Changelog。
        required: false
        type: boolean
        default: true

      publish:
        description: 是否发布到 npm Registry。
        required: false
        type: boolean
        default: false

      stage:
        description: 是否执行 stage publish（预发布验证）。
        required: false
        type: boolean
        default: false

      build:
        description: 发布前执行的构建命令。
        required: false
        type: string
        default: ""

      tag:
        description: 发布时使用的 npm dist-tag。
        required: false
        type: string
        default: ""

jobs:
  changelog:
    if: ${{ inputs.github-release }}
    uses: ./.github/workflows/changelog.yml

  publish:
    if: ${{ inputs.publish || inputs.stage }}
    uses: ./.github/workflows/publish.yml
    with:
      build: ${{ inputs.build }}
      stage: ${{ inputs.stage }}
      tag: ${{ inputs.tag }}
