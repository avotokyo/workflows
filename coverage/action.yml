name: Coverage

on:
  workflow_call:
    inputs:
      test:
        description: 指定覆盖率测试执行命令。
        required: false
        type: string
        default: vp test run --coverage

      build:
        description: 测试前执行的构建命令。
        required: false
        type: string
        default: vp run build

jobs:
  coverage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Setup Vite+
        uses: avotokyo/workflows/setup-vp@main
        with:
          fetch-all: false
          cache: true

      - name: Build
        if: ${{ inputs.build != '' }}
        run: ${{ inputs.build }}

      - name: Coverage
        if: ${{ inputs.test != '' }}
        run: ${{ inputs.test }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          use_oidc: true
